<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Estasi - La radio del futuro</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffcc00;
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --danger: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        header {
            background: rgba(0,0,0,0.95);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo-text {
            color: var(--primary);
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255,204,0,0.3);
            cursor: pointer;
        }
        nav { display: flex; gap: 25px; justify-content: center; margin: 15px 0; }
        .nav-item { position: relative; cursor: pointer; color: var(--text); font-weight: 600; font-size: 0.95rem; transition: 0.3s; }
        .nav-item:hover { color: var(--primary); }
        
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            border: 1px solid var(--primary);
            min-width: 180px;
            z-index: 10;
        }
        .nav-item:hover .dropdown { display: block; }
        .dropdown div { padding: 12px; border-bottom: 1px solid #222; font-size: 0.85rem; color: #fff; }
        .dropdown div:hover { background: var(--primary); color: #000; }

        .player-bar {
            max-width: 1200px;
            margin: 5px auto 0;
            background: linear-gradient(90deg, #151515, #000);
            border-radius: 50px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,204,0,0.2);
        }
        .play-controls { display: flex; align-items: center; gap: 15px; }
        .play-btn {
            background: var(--primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; min-height: 70vh; }
        .section-flex { display: flex; align-items: center; gap: 40px; margin-bottom: 80px; }
        .hero-text { flex: 1; }
        .hero-img { width: 350px; height: 350px; border-radius: 20px; object-fit: cover; box-shadow: 0 0 30px rgba(255,204,0,0.2); }
        
        .btn {
            background: var(--primary);
            color: #000;
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            margin-top: 15px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 40px 0; }
        .price-card { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .price-card.silver { border: 2px solid var(--primary); transform: scale(1.05); }

        .on-air-badge {
            background: var(--danger);
            color: white;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.7rem;
            margin-right: 12px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% {opacity: 1} 50% {opacity: 0.5} 100% {opacity: 1} }

        .prog-item { display: flex; align-items: center; gap: 20px; background: var(--card-bg); padding: 20px; margin-bottom: 15px; border-radius: 15px; }
        .prog-item.active-now { border-left: 5px solid var(--danger); }
        .prog-img-circle { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        footer { background: #000; padding: 60px 20px 30px; border-top: 2px solid #222; margin-top: 100px; }
        .footer-main { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 40px; }
        .footer-col a { display: block; color: #888; text-decoration: none; margin-bottom: 10px; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .section-flex, .pricing-grid, .footer-main { flex-direction: column; grid-template-columns: 1fr; }
            .hero-img { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div onclick="showPage('home')" class="logo-text">RADIO ESTASI</div>
    </div>
    <nav>
        <div class="nav-item">LA RADIO
            <div class="dropdown">
                <div onclick="showPage('radio')">Chi Siamo</div>
                <div onclick="showPage('palinsesto')">Palinsesto</div>
                <div onclick="showPage('programmi')">Programmi</div>
                <div onclick="showPage('repliche')">Repliche</div>
            </div>
        </div>
        <div class="nav-item" onclick="showPage('news')">NEWS</div>
        <div class="nav-item" onclick="showPage('team')">TEAM</div>
        <div class="nav-item" onclick="showPage('eventi')">EVENTI</div>
        <div class="nav-item" onclick="showPage('admin')" style="color:var(--primary)">ADMIN</div>
    </nav>
    <div class="player-bar">
        <div class="play-controls">
            <button class="play-btn" id="btnPlay">▶</button>
            <div>
                <div style="font-size: 0.65rem; color: var(--primary); font-weight: bold;">LIVE DA ROMA</div>
                <div id="current-onair-title" style="font-size: 0.9rem; font-weight: 800;">Sintonizzazione...</div>
            </div>
        </div>
        <audio id="audioStream" src="https://stream.zeno.fm/qvdruxs5fqvvv"></audio>
        <div style="font-size: 0.7rem; color: #444;">LIVE</div>
    </div>
</header>

<div id="content" class="container"></div>

<footer>
    <div class="footer-main">
        <div class="footer-col">
            <h2 style="color:var(--primary)">Radio Estasi</h2>
            <p style="color:#555; font-size: 0.85rem;">La radio del futuro.</p>
        </div>
        <div class="footer-col">
            <h4>Pagine</h4>
            <a href="#" onclick="showPage('news')">News</a>
            <a href="#" onclick="showPage('radio')">Radio</a>
            <a href="#" onclick="showPage('palinsesto')">Palinsesto</a>
        </div>
        <div class="footer-col">
            <h4>Link Utili</h4>
            <a href="#" onclick="showPage('archivio')">Archivio Opere</a>
            <a href="#" onclick="showPage('contatti')">Contattaci</a>
            <a href="#" onclick="showPage('privacy')">Privacy Policy</a>
        </div>
        <div class="footer-col" style="text-align: right;"><img src="favicon.jpg" width="60" style="border-radius:10px"></div>
    </div>
    <div style="text-align:center; color:#333; font-size: 0.8rem; margin-top:40px;">© 2026 Radio Estasi</div>
</footer>

<script>
    const audio = document.getElementById('audioStream');
    const btnPlay = document.getElementById('btnPlay');
    btnPlay.onclick = () => {
        if (audio.paused) { audio.play(); btnPlay.innerText = "⏸"; }
        else { audio.pause(); btnPlay.innerText = "▶"; }
    };

    const db = {
        news: JSON.parse(localStorage.getItem('est_news')) || [],
        eventi: JSON.parse(localStorage.getItem('est_eventi')) || []
    };

    function getRomeTime() { return new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Rome"})); }

    function showPage(pageId) {
        const c = document.getElementById('content');
        window.scrollTo(0,0);

        if (pageId === 'home') {
            c.innerHTML = `
                <section class="section-flex">
                    <div class="hero-text">
                        <h1>Benvenuto/a su Radio Estasi!</h1>
                        <p>Benvenuto su Radio Estasi, una popolare stazione radio della zona di Roma. La nostra radio vanta una squadra di talentuosi professionisti che lavorano duramente per trasmettere le migliori hit, le news, i concerti, gli eventi più importanti e altro ancora. Sintonizzati su Radio Estasi e scopri ciò che abbiamo da offrire.</p>
                        <a href="#" onclick="showPage('radio')" class="btn">Scopri di più</a>
                    </div>
                    <img src="favicon.jpg" class="hero-img">
                </section>
                <section class="section-flex" style="background:var(--card-bg); padding:40px; border-radius:20px;">
                    <div class="hero-text">
                        <h2>La nostra app</h2>
                        <p>Installa l’app gratuita di Radio Estasi per ascoltarci dove e quando vuoi con il tuo smartphone. Ha molte funzionalità per renderla più semplice possibili.</p>
                        <a href="https://www.appcreator24.com/app3189964-35h0xg" target="_blank" class="btn">Installa l'app</a>
                    </div>
                    <div style="flex:1; text-align:center; font-size:4rem;">📱</div>
                </section>
                <div class="pricing-grid">
                    <div class="price-card"><h3>LITE</h3><p>2,99€/4 mesi</p></div>
                    <div class="price-card silver"><h3>SILVER</h3><p>5,99€/4 mesi</p></div>
                    <div class="price-card"><h3>GOLD</h3><p>14,99€/4 mesi</p></div>
                </div>
                <h2>Ultime News</h2><div id="h-news">${renderNews(3)}</div>
                <h2 style="margin-top:40px">Prossimi Eventi</h2><div id="h-eventi">${renderEventi(2)}</div>
            `;
        } 
        else if (pageId === 'radio') {
            c.innerHTML = `
                <div class="section-flex">
                    <img src="favicon.jpg" class="hero-img">
                    <div class="hero-text">
                        <h1>La nostra storia</h1>
                        <p>Tutto ebbe inizio in una piccola stanza, con un vecchio microfono, un mixer economico e tanta voglia di sperimentare. Il protagonista di questa storia era solo un ragazzo curioso, affascinato da quel mondo invisibile fatto di onde radio e voci che attraversavano l’etere. Passava le ore a registrare finti programmi, a mixare musica e a immaginare un pubblico dall’altra parte dell’altoparlante.<br><br>Ogni giorno imparava qualcosa di nuovo: come migliorare l’audio, come creare una scaletta, come parlare in modo più sicuro davanti al microfono. Con pazienza e determinazione, iniziò ad acquistare attrezzature sempre più sofisticate: una console più potente, microfoni professionali, pannelli fonoassorbenti per isolare il suono. Quella che un tempo era solo una cameretta diventava, pezzo dopo pezzo, un vero e proprio studio radiofonico.<br><br>Fu allora che nacque Radio Estasi. Il nome non fu scelto a caso: “Estasi” rappresentava l’emozione pura, quel brivido che provava ogni volta che andava in onda. Oggi Radio Estasi è molto più di una web radio: è una community, un punto di riferimento per chi ama la musica, l’informazione libera e le emozioni vere. Ma dietro ogni successo, resta sempre viva l’immagine di quel ragazzo che accese per la prima volta un microfono… e diede inizio a tutto.</p>
                        <a href="#" onclick="showPage('contatti')" class="btn">Contattaci</a>
                    </div>
                </div>
            `;
        }
        else if (pageId === 'news') { c.innerHTML = `<h1>News</h1><div>${renderNews(20)}</div>`; }
        else if (pageId === 'eventi') { c.innerHTML = `<h1>Eventi</h1><div>${renderEventi(20)}</div>`; }
        else if (pageId === 'team') { 
            c.innerHTML = `<h1>Il Team</h1><p>La squadra di Radio Estasi è composta da professionisti appassionati. (Sezione in aggiornamento profili)</p>`; 
        }
        else if (pageId === 'palinsesto') { renderPalinsestoLayout(); }
        else if (pageId === 'programmi') {
            c.innerHTML = `
                <h1>Programmi Radiofonici</h1>
                <div class="prog-item"><img src="wake-up-radio.png" class="prog-img-circle"><div><h3>Wake up radio</h3><p>Dalle 10 alle 13, la tua mattina inizia qui.</p></div></div>
                <div class="prog-item"><img src="shuffle.png" class="prog-img-circle"><div><h3>Shuffle</h3><p>La musica senza regole! Ogni brano è una sorpresa.</p></div></div>
                <div class="prog-item"><img src="musica-soft.png" class="prog-img-circle"><div><h3>Musica soft</h3><p>La colonna sonora dei tuoi momenti tranquilli.</p></div></div>
                <div class="prog-item"><img src="cado-tra-le-pagine.png" class="prog-img-circle"><div><h3>Cado tra le pagine</h3><p>Storie per addormentarsi con la mente e sognare con il cuore.</p></div></div>
                <div class="prog-item"><img src="80-90.png" class="prog-img-circle"><div><h3>80' 90'</h3><p>La musica che non passa mai di moda!</p></div></div>
            `;
        }
        else if (pageId === 'contatti') {
            c.innerHTML = `<h1>Contatti</h1><p>Email: radioestasi1@gmail.com</p><p>Tel: 3924758156</p><p>Monterotondo - Roma</p>`;
        }
        else if (pageId === 'privacy') {
            c.innerHTML = `<h1>Privacy Policy</h1><div style="background:var(--card-bg); padding:20px; border-radius:10px; font-size:0.9rem;">
                <strong>1. Chi siamo</strong><br>Radio Estasi – La radio del futuro! radioestasi1@gmail.com<br><br>
                <strong>2. Dati raccolti</strong><br>Quando ti iscrivi alla newsletter, raccogliamo nome e email.<br><br>
                <strong>3. Uso dei dati</strong><br>I dati vengono utilizzati esclusivamente per rispondere alle tue richieste.<br><br>
                <strong>4. Condivisione dei dati</strong><br>I tuoi dati personali non sono condivisi con nessuno.<br><br>
                <strong>5. Diritti degli utenti</strong><br>Hai il diritto di accedere ai tuoi dati o chiederne la cancellazione.<br><br>
                <strong>6. Cookie</strong><br>Al momento non utilizziamo cookie di tracciamento.<br><br>
                <strong>7. Conservazione</strong><br>Conserviamo i dati fino a richiesta di eliminazione.<br><br>
                <strong>8. Contatti</strong><br>Per esercitare i tuoi diritti scrivi a radioestasi1@gmail.com</div>`;
        }
        else if (pageId === 'admin') {
            let p = prompt("Password:");
            if(p === "estasi2026") renderAdminPanel();
            else showPage('home');
        }
        updateGlobalOnAir();
    }

    function renderPalinsestoLayout() {
        const days = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
        const today = days[getRomeTime().getDay()];
        document.getElementById('content').innerHTML = `<h1>Palinsesto</h1><div style="display:flex; gap:10px; overflow-x:auto; margin-bottom:20px;">
            ${days.map(d => `<button class="btn" style="background:${d===today?'var(--danger)':'#222'}; color:#fff" onclick="renderDaySchedule('${d}')">${d}</button>`).join('')}
        </div><div id="schedule-list"></div>`;
        renderDaySchedule(today);
    }

    function renderDaySchedule(dayName) {
        const list = document.getElementById('schedule-list');
        const hour = getRomeTime().getHours();
        const isToday = (dayName === ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'][getRomeTime().getDay()]);
        const data = (dayName === 'Sabato' || dayName === 'Domenica') ? 
            [{s:0,e:1,t:"Musica Soft",i:"musica-soft.png"},{s:1,e:8,t:"Shuffle",i:"shuffle.png"},{s:8,e:10,t:"Musica 80-90",i:"80-90.png"},{s:10,e:13,t:"Mattia Chialastri",i:"mattia-chialastri.jpg",d:"Fate solo cose positive!"},{s:13,e:20,t:"Shuffle",i:"shuffle.png"}] :
            [{s:0,e:1,t:"Musica Soft",i:"musica-soft.png"},{s:1,e:8,t:"Shuffle",i:"shuffle.png"},{s:8,e:10,t:"Musica 80-90",i:"80-90.png"},{s:10,e:20,t:"Shuffle",i:"shuffle.png"}];
        
        list.innerHTML = data.map(p => `<div class="prog-item ${isToday && hour>=p.s && hour<p.e ? 'active-now' : ''}">
            <div style="width:60px; font-weight:800; color:var(--primary)">${p.s}:00</div>
            <img src="${p.i}" class="prog-img-circle" style="width:50px; height:50px">
            <div>${isToday && hour>=p.s && hour<p.e ? '<span class="on-air-badge">ON AIR</span>' : ''}<strong>${p.t}</strong></div>
        </div>`).join('');
    }

    function renderNews(limit) {
        if(!db.news.length) return "<p>Nessuna news presente.</p>";
        return db.news.slice(0, limit).map(n => `<div style="background:var(--card-bg); padding:15px; border-radius:10px; margin-bottom:10px"><h4>${n.t}</h4><p>${n.d}</p></div>`).join('');
    }

    function renderEventi(limit) {
        if(!db.eventi.length) return "<p>Non sono presenti eventi, torna quando ci saranno contenuti!</p>";
        return db.eventi.slice(0, limit).map(e => `<div style="border-left:3px solid var(--primary); padding-left:15px; margin-bottom:10px"><h4>${e.t}</h4><p>${e.date}</p></div>`).join('');
    }

    function renderAdminPanel() {
        document.getElementById('content').innerHTML = `<h1>Admin</h1>
        <input id="nt" placeholder="Titolo News"><textarea id="nd" placeholder="Testo"></textarea><button onclick="saveNews()">Invia News</button><hr>
        <input id="et" placeholder="Titolo Evento"><input id="ed" placeholder="Data"><button onclick="saveEvento()">Invia Evento</button>`;
    }

    function saveNews() { db.news.unshift({t:document.getElementById('nt').value, d:document.getElementById('nd').value}); localStorage.setItem('est_news', JSON.stringify(db.news)); showPage('home'); }
    function saveEvento() { db.eventi.unshift({t:document.getElementById('et').value, date:document.getElementById('ed').value}); localStorage.setItem('est_eventi', JSON.stringify(db.eventi)); showPage('home'); }

    function updateGlobalOnAir() {
        const now = getRomeTime();
        const h = now.getHours();
        const d = now.getDay();
        let cur = "Shuffle";
        if((d===0 || d===6) && h>=10 && h<13) cur = "Mattia Chialastri";
        else if(h>=0 && h<1) cur = "Musica Soft";
        else if(h>=8 && h<10) cur = "Musica 80-90";
        document.getElementById('current-onair-title').innerText = cur;
    }

    showPage('home');
    setInterval(updateGlobalOnAir, 30000);
</script>
</body>
</html>
