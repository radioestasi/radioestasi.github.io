<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Estasi - La radio del futuro</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffcc00;
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --danger: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }

        /* HEADER & NAV */
        header {
            background: rgba(0,0,0,0.95);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo-text {
            color: var(--primary);
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255,204,0,0.3);
        }
        nav { display: flex; gap: 20px; justify-content: center; margin: 10px 0; }
        .nav-item { position: relative; cursor: pointer; color: var(--text); font-weight: 600; font-size: 0.9rem; }
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #111;
            border: 1px solid var(--primary);
            min-width: 160px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .nav-item:hover .dropdown { display: block; }
        .dropdown div { padding: 10px; border-bottom: 1px solid #222; }
        .dropdown div:hover { background: var(--primary); color: #000; }

        /* CUSTOM PLAYER BAR */
        .player-container {
            max-width: 1200px;
            margin: 10px auto 0;
            background: linear-gradient(90deg, #1a1a1a, #000);
            border-radius: 50px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,204,0,0.2);
        }
        .player-info { display: flex; align-items: center; gap: 15px; }
        .play-btn {
            background: var(--primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--primary); }
        
        /* ON AIR BADGE */
        .on-air-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-right: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* PALINSESTO ITEMS */
        .prog-item { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            background: var(--card-bg); 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 12px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .prog-item.active-now {
            border: 1px solid var(--danger);
            background: rgba(255, 0, 0, 0.05);
        }
        .prog-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; }

        /* RESTO DEGLI STILI (Uguali a prima per brevità ma integrati) */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .btn { background: var(--primary); color: #000; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; display: inline-block; }
        .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .price-card { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        footer { background: #000; padding: 40px 20px; border-top: 1px solid #333; margin-top: 50px; }
        .footer-grid { display: grid; grid-template-columns: repeat(4, 1fr); max-width: 1200px; margin: 0 auto; gap: 20px; }

        @media (max-width: 768px) {
            .pricing-grid, .footer-grid { grid-template-columns: 1fr; }
            nav { gap: 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <a href="#" onclick="showPage('home')" class="logo-text">RADIO ESTASI</a>
    </div>
    <nav>
        <div class="nav-item">LA RADIO
            <div class="dropdown">
                <div onclick="showPage('radio')">Chi Siamo</div>
                <div onclick="showPage('palinsesto')">Palinsesto</div>
                <div onclick="showPage('programmi')">Programmi</div>
                <div onclick="showPage('repliche')">Repliche</div>
            </div>
        </div>
        <div onclick="showPage('news')" class="nav-item">NEWS</div>
        <div onclick="showPage('team')" class="nav-item">TEAM</div>
        <div onclick="showPage('eventi')" class="nav-item">EVENTI</div>
        <div onclick="showPage('admin')" class="nav-item" style="color:var(--primary)">ADMIN</div>
    </nav>

    <div class="player-container">
        <div class="player-info">
            <button class="play-btn" id="masterPlay">▶</button>
            <div>
                <div style="font-size: 0.7rem; color: var(--primary); font-weight: bold; letter-spacing: 1px;">Sintonizzato su Rome, IT</div>
                <div style="font-size: 0.9rem; font-weight: 600;" id="current-show-title">Caricamento streaming...</div>
            </div>
        </div>
        <audio id="radioStream" src="https://stream.zeno.fm/qvdruxs5fqvvv"></audio>
        <div style="font-size: 0.8rem; color: #666;">LIVE 24/7</div>
    </div>
</header>

<div id="content" class="container"></div>

<footer>
    <div class="footer-grid">
        <div><h3>Radio Estasi</h3><p>La radio del futuro.</p></div>
        <div>
            <h4>Menu</h4>
            <a href="#" onclick="showPage('news')">News</a><br>
            <a href="#" onclick="showPage('palinsesto')">Palinsesto</a>
        </div>
        <div>
            <h4>Link</h4>
            <a href="https://forms.gle/A2HR6SCWUbEXafv69" target="_blank">Lavora con noi</a><br>
            <a href="#" onclick="showPage('privacy')">Privacy Policy</a>
        </div>
        <div style="text-align:right"><img src="favicon.jpg" width="60" style="border-radius:5px"></div>
    </div>
    <center style="margin-top:30px; font-size:0.7rem; color:#444">© 2026 Radio Estasi. Tutti i diritti riservati.</center>
</footer>

<script>
    const stream = document.getElementById('radioStream');
    const playBtn = document.getElementById('masterPlay');

    playBtn.onclick = () => {
        if (stream.paused) {
            stream.play();
            playBtn.innerText = "⏸";
        } else {
            stream.pause();
            playBtn.innerText = "▶";
        }
    };

    function getRomeTime() {
        return new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Rome"}));
    }

    function showPage(pageId) {
        const content = document.getElementById('content');
        if (pageId === 'home') {
            content.innerHTML = `
                <div style="display:flex; align-items:center; gap:30px; margin-bottom:50px">
                    <div>
                        <h1>Benvenuto/a su Radio Estasi!</h1>
                        <p>Benvenuto su Radio Estasi, una popolare stazione radio della zona di Roma. Sintonizzati e scopri il futuro.</p>
                        <a href="#" onclick="showPage('radio')" class="btn">Scopri di più</a>
                    </div>
                    <img src="favicon.jpg" width="250" style="border-radius:20px; box-shadow: 0 0 20px var(--primary)">
                </div>
                `;
        } 
        else if (pageId === 'palinsesto') {
            renderPalinsestoPage();
        }
        // ... (Altre pagine news, team, etc rimangono come prima)
    }

    function renderPalinsestoPage() {
        const days = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
        const now = getRomeTime();
        const currentDayName = days[now.getDay()];

        document.getElementById('content').innerHTML = `
            <h1 style="text-align:center; color:var(--primary)">Palinsesto Live</h1>
            <div style="display:flex; gap:10px; overflow-x:auto; padding-bottom:20px; margin:20px 0;">
                ${days.map(d => `<button onclick="renderDay('${d}')" class="btn" style="background:${d===currentDayName?'var(--danger)':'#222'}; color:white">${d}</button>`).join('')}
            </div>
            <div id="day-list"></div>
        `;
        renderDay(currentDayName);
    }

    function renderDay(selectedDay) {
        const list = document.getElementById('day-list');
        const now = getRomeTime();
        const currentHour = now.getHours();
        const days = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
        const isToday = (selectedDay === days[now.getDay()]);

        const schedule = (selectedDay === 'Sabato' || selectedDay === 'Domenica') ? [
            {h: 0, hEnd: 1, title: "Musica Soft", img: "musica-soft.png"},
            {h: 1, hEnd: 8, title: "Shuffle", img: "shuffle.png"},
            {h: 8, hEnd: 10, title: "Musica 80' 90'", img: "80-90.png"},
            {h: 10, hEnd: 13, title: "Mattia Chialastri", img: "mattia-chialastri.jpg", desc: "Il mondo fantastico della radio..."},
            {h: 13, hEnd: 20, title: "Shuffle", img: "shuffle.png"},
            {h: 20, hEnd: 21, title: "Musica 80' 90'", img: "80-90.png"},
            {h: 21, hEnd: 24, title: "Musica Soft", img: "musica-soft.png"}
        ] : [
            {h: 0, hEnd: 1, title: "Musica Soft", img: "musica-soft.png"},
            {h: 1, hEnd: 8, title: "Shuffle", img: "shuffle.png"},
            {h: 8, hEnd: 10, title: "Musica 80' 90'", img: "80-90.png"},
            {h: 10, hEnd: 20, title: "Shuffle", img: "shuffle.png"},
            {h: 20, hEnd: 21, title: "Musica 80' 90'", img: "80-90.png"},
            {h: 21, hEnd: 24, title: "Musica Soft", img: "musica-soft.png"}
        ];

        list.innerHTML = schedule.map(prog => {
            const isLive = isToday && (currentHour >= prog.h && currentHour < prog.hEnd);
            if(isLive) document.getElementById('current-show-title').innerText = prog.title;
            
            return `
                <div class="prog-item ${isLive ? 'active-now' : ''}">
                    <div style="width:100px; font-weight:bold; color:var(--primary)">
                        ${prog.h.toString().padStart(2, '0')}:00
                    </div>
                    <img src="${prog.img}" class="prog-img">
                    <div style="flex-grow:1">
                        ${isLive ? '<span class="on-air-badge">On Air</span>' : ''}
                        <strong style="font-size:1.1rem">${prog.title}</strong>
                        ${prog.desc ? `<p style="font-size:0.8rem; color:#888">${prog.desc}</p>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    // Avvio
    showPage('home');
    // Aggiornamento automatico ogni minuto per il bollino "On Air"
    setInterval(() => { if(document.getElementById('day-list')) renderPalinsestoPage(); }, 60000);
</script>

</body>
</html>
